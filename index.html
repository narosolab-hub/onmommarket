<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>온맘마켓 · 공구플랫폼 기획</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root {
  --primary: #2563EB;
  --primary-light: #EFF6FF;
  --primary-dark: #1E40AF;
  --green: #10B981;
  --green-light: #ECFDF5;
  --green-dark: #047857;
  --accent: #F59E0B;
  --accent-light: #FFFBEB;
  --purple: #8B5CF6;
  --purple-light: #F5F3FF;
  --red: #EF4444;
  --red-light: #FEF2F2;
  --dark: #1a1a1a;
  --gray-900: #111827;
  --gray-700: #374151;
  --gray-600: #4B5563;
  --gray-500: #6B7280;
  --gray-400: #9CA3AF;
  --gray-300: #D1D5DB;
  --gray-200: #E5E7EB;
  --gray-100: #F3F4F6;
  --white: #ffffff;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
}

/* ── 온맘마켓 컨셉 탭: CSS 변수 오버라이드 ── */
.concept-section {
  --primary: #1A6840;
  --primary-light: #EAF7F0;
  --primary-dark: #0F4D2E;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--gray-100);
  color: var(--gray-900);
  line-height: 1.6;
}

/* ── Top Tab Bar ── */
.top-tabs {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 56px;
  background: var(--dark);
  display: flex;
  align-items: center;
  padding: 0 24px;
  z-index: 200;
  gap: 8px;
}
.top-tab {
  padding: 10px 24px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  color: rgba(255,255,255,0.6);
  border: none;
  background: transparent;
}
.top-tab:hover { color: white; background: rgba(255,255,255,0.1); }
.top-tab.active { background: var(--primary); color: white; }
.top-tab.active.green { background: #1A6840; }

/* ── App Layout ── */
.app {
  display: flex;
  min-height: 100vh;
  padding-top: 56px;
}

/* ── Sidebar ── */
.sidebar {
  width: 260px;
  background: var(--gray-900);
  color: var(--white);
  padding: 24px 0;
  position: fixed;
  left: 0; top: 56px;
  height: calc(100vh - 56px);
  overflow-y: auto;
  z-index: 100;
}
.sidebar-header {
  padding: 0 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  margin-bottom: 16px;
}
.logo { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.subtitle { font-size: 12px; opacity: 0.5; }
.nav-section { padding: 0 12px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; border-radius: 10px;
  cursor: pointer; transition: all 0.2s;
  margin-bottom: 2px; font-size: 13px; font-weight: 500;
  color: rgba(255,255,255,0.6);
}
.nav-item:hover { background: rgba(255,255,255,0.08); color: white; }
.nav-item.active { background: var(--primary); color: white; }
.nav-item.active.green { background: #1A6840; }
.nav-item .num {
  font-size: 10px; font-weight: 700;
  background: rgba(255,255,255,0.15);
  padding: 3px 7px; border-radius: 5px;
}

/* ── Main Content ── */
.main {
  margin-left: 260px;
  margin-right: 300px;
  padding: 32px 40px;
  flex: 1;
  min-height: calc(100vh - 56px);
}
.section { max-width: 960px; margin: 0 auto; }
.section-header { margin-bottom: 32px; }

/* Platform section-num (text style) */
.section-num {
  font-size: 13px; font-weight: 700;
  color: var(--primary); margin-bottom: 6px;
}
.section-num.green { color: var(--green); }

/* Concept section-num (pill badge via .concept-section scope) */
.concept-section .section-num {
  display: inline-block;
  background: var(--primary);
  color: white;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 16px;
}

.section-title { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
.section-desc { font-size: 15px; color: var(--gray-500); }

/* ── Cards ── */
.card {
  background: white; border-radius: 14px;
  padding: 24px; box-shadow: var(--shadow);
  margin-bottom: 20px;
}
.card-title {
  font-size: 16px; font-weight: 700;
  margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.card-title .icon { font-size: 20px; }

/* ── Grids ── */
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

/* ── Tags ── */
.tag { display: inline-block; padding: 5px 10px; border-radius: 16px; font-size: 11px; font-weight: 600; }
.tag-primary { background: var(--primary-light); color: var(--primary); }
.tag-green { background: var(--green-light); color: var(--green-dark); }
.tag-accent { background: var(--accent-light); color: #B45309; }
.tag-purple { background: var(--purple-light); color: var(--purple); }
.tag-red { background: var(--red-light); color: var(--red); }
.tag-gray { background: var(--gray-100); color: var(--gray-700); }

/* ── Tables ── */
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid var(--gray-200); }
th { background: var(--gray-100); font-weight: 700; color: var(--gray-700); }

/* ── KPI Cards (platform) ── */
.kpi-card {
  background: var(--gray-100);
  padding: 18px; border-radius: 12px; text-align: center;
}
.kpi-value { font-size: 26px; font-weight: 800; color: var(--primary); margin-bottom: 4px; }
.kpi-label { font-size: 13px; font-weight: 600; color: var(--gray-700); }
.kpi-note { font-size: 11px; color: var(--gray-500); margin-top: 4px; }

/* ── KPI Cards (concept override) ── */
.concept-section .kpi-card {
  background: linear-gradient(135deg, white 0%, var(--gray-100) 100%);
  border: 2px solid var(--gray-200);
  border-radius: 16px;
  padding: 20px;
  text-align: center;
}
.concept-section .kpi-value {
  font-size: 22px; font-weight: 800; color: var(--primary);
  margin-bottom: 4px; white-space: nowrap;
}
.concept-section .kpi-label { font-size: 13px; font-weight: 600; color: var(--gray-700); margin-bottom: 6px; }
.concept-section .kpi-note { font-size: 11px; color: var(--gray-500); }

/* 비용 카드 숫자 (overflow 방지) */
.cost-amount {
  font-size: clamp(20px, 2.2vw, 26px);
  font-weight: 800;
  color: var(--primary);
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── Highlight Box ── */
.highlight-box {
  background: linear-gradient(135deg, var(--primary-light) 0%, #DBEAFE 100%);
  border-radius: 14px; padding: 24px; margin-bottom: 20px;
}
.highlight-box.green {
  background: linear-gradient(135deg, var(--green-light) 0%, #D1FAE5 100%);
}
/* concept highlight box */
.concept-section .highlight-box {
  background: linear-gradient(135deg, var(--primary-light) 0%, #D1FAE5 100%);
  border-radius: 16px; padding: 24px;
  border: 2px solid var(--primary);
}

/* ── Alert ── */
.alert {
  display: flex; gap: 12px; padding: 14px 18px;
  border-radius: 10px; margin-bottom: 20px;
}
.alert-icon { font-size: 18px; }
.alert-primary { background: var(--primary-light); border: 1px solid var(--primary); }
.alert-accent { background: var(--accent-light); border: 1px solid var(--accent); }
.alert-title { font-weight: 700; margin-bottom: 2px; font-size: 14px; }
.alert-text { font-size: 13px; color: var(--gray-700); }
.alert-content { flex: 1; }

/* ── Phase Cards ── */
.phase-card { background: white; border-radius: 14px; padding: 20px; box-shadow: var(--shadow); border-top: 4px solid var(--gray-300); }
.phase-card.phase-1 { border-top-color: var(--primary); }
.phase-card.phase-2 { border-top-color: var(--purple); }
.phase-card.phase-3 { border-top-color: var(--accent); }

/* ── Timeline (platform style) ── */
.timeline { display: flex; justify-content: space-between; position: relative; margin: 28px 0; }
.timeline::before { content: ''; position: absolute; top: 18px; left: 0; right: 0; height: 3px; background: var(--gray-200); }
.timeline-item { display: flex; flex-direction: column; align-items: center; position: relative; z-index: 1; }
.timeline-dot {
  width: 36px; height: 36px; border-radius: 50%;
  background: white; border: 3px solid var(--gray-300);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; margin-bottom: 10px;
}
.timeline-item.active .timeline-dot { border-color: var(--primary); background: var(--primary); color: white; }
.timeline-label { font-size: 12px; font-weight: 600; }
.timeline-period { font-size: 10px; color: var(--gray-500); margin-top: 2px; }

/* ── Timeline (concept / vertical style) ── */
.concept-section .timeline { display: block; position: relative; padding-left: 32px; margin: 0; }
.concept-section .timeline::before {
  content: ''; position: absolute;
  left: 11px; top: 8px; bottom: 8px;
  width: 2px; background: var(--gray-300);
  height: auto;
}
.concept-section .timeline-item { display: block; position: relative; padding-bottom: 32px; align-items: initial; }
.concept-section .timeline-item:last-child { padding-bottom: 0; }
.concept-section .timeline-dot {
  position: absolute; left: -32px; top: 4px;
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--primary); border: 4px solid white;
  box-shadow: 0 0 0 2px var(--primary);
  margin-bottom: 0; font-size: 0;
}
.concept-section .timeline-item.future .timeline-dot { background: var(--gray-300); box-shadow: 0 0 0 2px var(--gray-300); }
.timeline-phase { font-size: 12px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.concept-section .timeline-item.future .timeline-phase { color: var(--gray-500); }
.timeline-title { font-size: 18px; font-weight: 700; color: var(--gray-900); margin-bottom: 8px; }
.timeline-content { font-size: 14px; color: var(--gray-600); }

/* ── Nav Buttons ── */
.nav-buttons {
  display: flex; justify-content: space-between;
  margin-top: 40px; padding-top: 24px;
  border-top: 1px solid var(--gray-200);
}
.nav-btn { padding: 12px 24px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: none; }
.nav-btn-prev { background: white; color: var(--gray-700); border: 1px solid var(--gray-300); }
.nav-btn-next { background: var(--primary); color: white; }
.nav-btn-next.green { background: #1A6840; }
.nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Memo Panel ── */
.memo-panel {
  width: 300px; background: white;
  border-left: 1px solid var(--gray-300);
  position: fixed; right: 0; top: 56px;
  height: calc(100vh - 56px);
  display: flex; flex-direction: column; z-index: 100;
}
.memo-header { padding: 16px; border-bottom: 1px solid var(--gray-300); background: var(--gray-100); }
.memo-header-title { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
.memo-header-desc { font-size: 11px; color: var(--gray-500); }
.memo-content { flex: 1; overflow-y: auto; padding: 14px; }
.memo-textarea {
  width: 100%; height: 100%; min-height: 280px;
  border: 1px solid var(--gray-300); border-radius: 8px;
  padding: 12px; font-family: inherit; font-size: 13px;
  line-height: 1.6; resize: none; outline: none;
}
.memo-textarea:focus { border-color: var(--primary); }
.memo-footer { padding: 14px; border-top: 1px solid var(--gray-300); background: var(--gray-100); }
.memo-btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 6px; }
.memo-btn-primary { background: var(--primary); color: white; }
.memo-btn-secondary { background: white; color: var(--gray-700); border: 1px solid var(--gray-300); }
.memo-saved { font-size: 10px; color: var(--gray-500); text-align: center; margin-top: 4px; }
.memo-toast {
  position: fixed; bottom: 20px; right: 320px;
  background: var(--gray-900); color: white;
  padding: 10px 18px; border-radius: 8px; font-size: 13px;
  animation: fadeInOut 2s ease-in-out; z-index: 300;
}
@keyframes fadeInOut {
  0% { opacity: 0; transform: translateY(10px); }
  15% { opacity: 1; transform: translateY(0); }
  85% { opacity: 1; }
  100% { opacity: 0; }
}

/* ── Cost / Platform specific ── */
.cost-highlight { background: var(--primary-light); }
.cost-total { font-size: 16px; font-weight: 800; color: var(--primary); }

/* ── Utility ── */
.mb-8 { margin-bottom: 8px; }
.mb-16 { margin-bottom: 16px; }
.mb-20 { margin-bottom: 20px; }
.mb-24 { margin-bottom: 24px; }
.mb-32 { margin-bottom: 32px; }
.mb-40 { margin-bottom: 40px; }
.text-center { text-align: center; }
.text-primary { color: var(--primary); }
.text-accent { color: var(--accent); }
.text-gray { color: var(--gray-500); }
.font-bold { font-weight: 700; }

/* ────────────────────────────────────────
   온맘마켓 컨셉 전용 CSS 클래스들
   ──────────────────────────────────────── */

/* Competitor Cards */
.competitor-card {
  background: white; border-radius: 16px; padding: 24px;
  box-shadow: var(--shadow); border: 2px solid transparent;
  transition: all 0.2s;
}
.competitor-card.highlight { border-color: var(--primary); background: var(--primary-light); }
.competitor-rank { font-size: 28px; margin-bottom: 12px; }
.competitor-name { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
.competitor-stat { font-size: 13px; color: var(--gray-500); margin-bottom: 4px; }
.competitor-stat strong { color: var(--gray-900); }

/* Stat Box */
.stat-box {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white; border-radius: 16px; padding: 24px; text-align: center;
}
.stat-value { font-size: 36px; font-weight: 800; margin-bottom: 4px; }
.stat-label { font-size: 13px; opacity: 0.85; font-weight: 600; }

/* Compare Table */
.compare-table { width: 100%; border-collapse: collapse; }
.compare-table th, .compare-table td { padding: 16px 20px; text-align: left; border-bottom: 1px solid var(--gray-300); }
.compare-table th { background: var(--gray-100); font-weight: 700; font-size: 14px; color: var(--gray-700); }
.compare-table td { font-size: 14px; }
.compare-table .highlight-col { background: var(--primary-light); }
.compare-table .highlight-col strong { color: var(--primary); }

/* Flow */
.flow-container {
  display: flex; align-items: center; gap: 8px;
  flex-wrap: nowrap; justify-content: center;
  padding: 20px 0; overflow-x: auto;
}
.flow-step {
  background: white; border: 2px solid var(--gray-300); border-radius: 12px;
  padding: 12px 14px; text-align: center;
  min-width: 108px; flex-shrink: 0; transition: all 0.2s;
}
.flow-step.primary { border-color: var(--primary); background: var(--primary-light); }
.flow-step.accent { border-color: var(--accent); background: var(--accent-light); }
.flow-step-icon { font-size: 22px; margin-bottom: 6px; }
.flow-step-title { font-size: 13px; font-weight: 700; color: var(--gray-900); }
.flow-step-desc { font-size: 11px; color: var(--gray-500); margin-top: 3px; }
.flow-arrow { font-size: 18px; color: var(--gray-400); font-weight: 300; flex-shrink: 0; }

/* Feature List */
.feature-group { margin-bottom: 32px; }
.feature-group-title { font-size: 16px; font-weight: 700; color: var(--primary); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--primary-light); }
.feature-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--gray-100); }
.feature-check { width: 22px; height: 22px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; margin-top: 2px; }
.feature-check.optional { background: var(--gray-300); color: var(--gray-700); }
.feature-text { flex: 1; }
.feature-name { font-weight: 600; font-size: 14px; color: var(--gray-900); }
.feature-desc { font-size: 13px; color: var(--gray-500); margin-top: 2px; }

/* System Architecture */
.system-arch { display: grid; grid-template-columns: 1fr auto 1fr; gap: 32px; align-items: start; padding: 32px; }
.system-block { display: flex; flex-direction: column; gap: 12px; }
.system-box { background: white; border: 2px solid var(--gray-300); border-radius: 16px; padding: 24px; text-align: center; }
.system-box.consumer { border-color: var(--primary); background: var(--primary-light); }
.system-box.business { border-color: var(--purple); background: var(--purple-light); }
.system-box.backend { border-color: var(--gray-500); background: var(--gray-100); }
.system-box-icon { font-size: 36px; margin-bottom: 8px; }
.system-box-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.system-box-desc { font-size: 13px; color: var(--gray-500); }
.system-features { display: flex; flex-direction: column; gap: 8px; }
.system-feature { background: white; border: 1px solid var(--gray-200); border-radius: 10px; padding: 12px 16px; font-size: 14px; font-weight: 500; text-align: center; }
.system-center { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding-top: 40px; }
.system-arrow { display: flex; align-items: center; gap: 8px; color: var(--gray-400); font-size: 14px; }
.system-arrow-line { width: 40px; height: 2px; background: var(--gray-300); }

/* Pain / Solution Points */
.pain-point { background: #FEE2E2; border-left: 4px solid #EF4444; padding: 16px 20px; border-radius: 0 12px 12px 0; margin-bottom: 12px; }
.pain-point-text { font-size: 14px; color: #991B1B; }
.solution-point { background: #D1FAE5; border-left: 4px solid var(--primary); padding: 16px 20px; border-radius: 0 12px 12px 0; margin-bottom: 12px; }
.solution-point-text { font-size: 14px; color: var(--primary-dark); }

/* BM Model */
.bm-row { display: flex; gap: 24px; margin-bottom: 24px; }
.bm-box { flex: 1; background: white; border-radius: 16px; padding: 24px; box-shadow: var(--shadow); }
.bm-box-title { font-size: 14px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
.bm-box-content { font-size: 15px; color: var(--gray-900); line-height: 1.7; }
.bm-price { font-size: 28px; font-weight: 800; color: var(--primary); }
.bm-price-unit { font-size: 14px; color: var(--gray-500); font-weight: 500; }

/* Cost Table */
.cost-table { width: 100%; border-collapse: collapse; margin-top: 16px; }
.cost-table th, .cost-table td { padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--gray-200); font-size: 14px; }
.cost-table th { background: var(--gray-100); font-weight: 700; color: var(--gray-700); }
.cost-table .cost-range { font-weight: 700; color: var(--primary); }

/* Risk Items */
.risk-item { display: flex; gap: 16px; padding: 20px; background: white; border-radius: 12px; margin-bottom: 16px; border-left: 4px solid #EF4444; }
.risk-item.mitigated { border-left-color: var(--primary); }
.risk-icon { font-size: 24px; }
.risk-content { flex: 1; }
.risk-title { font-size: 15px; font-weight: 700; color: var(--gray-900); margin-bottom: 4px; }
.risk-desc { font-size: 13px; color: var(--gray-600); margin-bottom: 8px; }
.risk-mitigation { background: var(--primary-light); padding: 10px 14px; border-radius: 8px; font-size: 13px; color: var(--primary-dark); }

/* Discussion Cards */
.discussion-card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow); border-left: 4px solid var(--accent); }
.discussion-question { font-size: 18px; font-weight: 700; color: var(--gray-900); margin-bottom: 16px; }
.discussion-options { display: flex; gap: 12px; flex-wrap: wrap; }
.discussion-option { background: var(--gray-100); border: 2px solid var(--gray-300); border-radius: 10px; padding: 14px 20px; font-size: 14px; font-weight: 600; color: var(--gray-700); cursor: pointer; transition: all 0.2s; }
.discussion-option:hover { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
.discussion-note { background: var(--gray-100); border-radius: 10px; padding: 16px; font-size: 13px; color: var(--gray-600); margin-top: 16px; }

@media (max-width: 1200px) {
  .memo-panel { display: none; }
  .main { margin-right: 0; }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// =====================
// TAB 1: 온맘마켓 컨셉 (v2 전체 내용)

function App() {
  const [activeTab, setActiveTab] = useState('concept');
  const [activeSection, setActiveSection] = useState('market');
  const [memo, setMemo] = useState('');
  const [toast, setToast] = useState(null);
  const saveTimeoutRef = useRef(null);

  const SECTIONS = activeTab === 'concept' ? SECTIONS_CONCEPT : SECTIONS_PLATFORM;

  useEffect(() => {
    const saved = localStorage.getItem('onmam_combined_memo');
    if (saved) setMemo(saved);
  }, []);

  useEffect(() => {
    setActiveSection(SECTIONS[0].id);
  }, [activeTab]);

  const saveMemo = (value) => {
    setMemo(value);
    if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
    saveTimeoutRef.current = setTimeout(() => {
      localStorage.setItem('onmam_combined_memo', value);
    }, 500);
  };

  const copyMemo = () => {
    if (!memo.trim()) { setToast('작성된 메모가 없습니다'); setTimeout(() => setToast(null), 2000); return; }
    const header = `📝 온맘마켓 · 공구플랫폼 미팅 메모\n작성일: ${new Date().toLocaleDateString('ko-KR')}\n\n${'='.repeat(40)}\n\n`;
    navigator.clipboard.writeText(header + memo).then(() => { setToast('✅ 메모가 복사되었습니다!'); setTimeout(() => setToast(null), 2000); });
  };

  const clearMemo = () => {
    if (window.confirm('메모를 삭제하시겠습니까?')) { setMemo(''); localStorage.removeItem('onmam_combined_memo'); }
  };

  const currentIndex = SECTIONS.findIndex(s => s.id === activeSection);

  const goTo = (direction) => {
    const newIndex = direction === 'next' ? currentIndex + 1 : currentIndex - 1;
    if (newIndex >= 0 && newIndex < SECTIONS.length) setActiveSection(SECTIONS[newIndex].id);
  };

  const renderConceptSection = () => {
    switch (activeSection) {
      case 'market':        return <Concept_Market />;
      case 'positioning':   return <Concept_Positioning />;
      case 'platform':      return <Concept_Platform />;
      case 'flow':          return <Concept_Flow />;
      case 'mvp':           return <Concept_MVP />;
      case 'cost':          return <Concept_Cost />;
      case 'kpi':           return <Concept_KPI />;
      case 'risk':          return <Concept_Risk />;
      case 'gtm':           return <Concept_GTM />;
      case 'discussion':    return <Concept_Discussion />;
      case 'openquestions': return <Concept_OpenQuestions />;
      default:              return <Concept_Market />;
    }
  };

  const renderPlatformSection = () => {
    switch (activeSection) {
      case 'p_market':   return <Platform_Market />;
      case 'p_vision':   return <Platform_Vision />;
      case 'p_roadmap':  return <Platform_Roadmap />;
      case 'p_cost':     return <Platform_Cost />;
      case 'p_webvsapp': return <Platform_WebVsApp />;
      case 'p_schedule': return <Platform_Schedule />;
      case 'p_kpi':      return <Platform_KPI />;
      case 'p_risk':     return <Platform_Risk />;
      default:           return <Platform_Market />;
    }
  };

  const isConceptTab = activeTab === 'concept';

  return (
    <div>
      {/* Top Tabs */}
      <div className="top-tabs">
        <button
          className={`top-tab ${isConceptTab ? 'active green' : ''}`}
          onClick={() => setActiveTab('concept')}
        >
          🥬 온맘마켓 컨셉
        </button>
        <button
          className={`top-tab ${!isConceptTab ? 'active' : ''}`}
          onClick={() => setActiveTab('platform')}
        >
          🛒 공구플랫폼 기획
        </button>
      </div>

      <div className="app">
        {/* Sidebar */}
        <nav className="sidebar">
          <div className="sidebar-header">
            <div className="logo">{isConceptTab ? '🥬 온맘마켓' : '🛒 플랫폼'}</div>
            <div className="subtitle">{isConceptTab ? '컨셉 기획안 v2' : '사업 기획'}</div>
          </div>
          <div className="nav-section">
            {SECTIONS.map((section) => (
              <div
                key={section.id}
                className={`nav-item ${activeSection === section.id ? (isConceptTab ? 'active green' : 'active') : ''}`}
                onClick={() => setActiveSection(section.id)}
              >
                <div className="num">{section.num}</div>
                <span>{section.title}</span>
              </div>
            ))}
          </div>
        </nav>

        {/* Main Content */}
        <main className="main">
          {isConceptTab
            ? <div className="concept-section">{renderConceptSection()}</div>
            : renderPlatformSection()
          }
          <div className="nav-buttons">
            <button className="nav-btn nav-btn-prev" onClick={() => goTo('prev')} disabled={currentIndex === 0}>
              ← 이전
            </button>
            <button
              className={`nav-btn nav-btn-next ${isConceptTab ? 'green' : ''}`}
              onClick={() => goTo('next')}
              disabled={currentIndex === SECTIONS.length - 1}
            >
              다음 →
            </button>
          </div>
        </main>

        {/* Memo Panel */}
        <aside className="memo-panel">
          <div className="memo-header">
            <div className="memo-header-title">📝 미팅 메모</div>
            <div className="memo-header-desc">자동 저장 · 로컬 저장</div>
          </div>
          <div className="memo-content">
            <textarea
              className="memo-textarea"
              placeholder={`미팅 중 메모...\n\n• 논의 사항:\n• 결정 사항:\n• Action Item:`}
              value={memo}
              onChange={(e) => saveMemo(e.target.value)}
            />
          </div>
          <div className="memo-footer">
            <button className="memo-btn memo-btn-primary" onClick={copyMemo}>📋 메모 복사</button>
            <button className="memo-btn memo-btn-secondary" onClick={clearMemo}>🗑️ 초기화</button>
            <div className="memo-saved">{memo.trim() ? `${memo.length}자` : '메모 없음'}</div>
          </div>
        </aside>
      </div>

      {toast && <div className="memo-toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
