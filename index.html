<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>온맘마켓 플랫폼 컨셉 기획안</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root {
  --primary: #1A6840;
  --primary-light: #EAF7F0;
  --primary-dark: #0F4D2E;
  --accent: #FF6B35;
  --accent-light: #FFF1EC;
  --purple: #6366F1;
  --purple-light: #EEF2FF;
  --dark: #1a1a1a;
  --gray-900: #212529;
  --gray-700: #495057;
  --gray-500: #6c757d;
  --gray-300: #dee2e6;
  --gray-100: #f8f9fa;
  --white: #ffffff;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--gray-100);
  color: var(--gray-900);
  line-height: 1.6;
}

.app {
  display: flex;
  min-height: 100vh;
}

/* Sidebar */
.sidebar {
  width: 280px;
  background: var(--dark);
  color: var(--white);
  padding: 32px 0;
  position: fixed;
  height: 100vh;
  overflow-y: auto;
  z-index: 100;
}

.sidebar-header {
  padding: 0 24px 32px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  margin-bottom: 24px;
}

.logo {
  font-size: 24px;
  font-weight: 800;
  color: #4ADE80;
  margin-bottom: 8px;
}

.subtitle {
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  font-weight: 500;
}

.nav-section {
  padding: 0 16px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 4px;
  font-size: 14px;
  font-weight: 600;
  color: rgba(255,255,255,0.7);
}

.nav-item:hover {
  background: rgba(255,255,255,0.08);
  color: var(--white);
}

.nav-item.active {
  background: var(--primary);
  color: var(--white);
}

.nav-item .num {
  width: 24px;
  height: 24px;
  border-radius: 6px;
  background: rgba(255,255,255,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
}

.nav-item.active .num {
  background: rgba(255,255,255,0.25);
}

/* Main Content */
.main {
  flex: 1;
  margin-left: 280px;
  padding: 40px 48px;
  max-width: 1200px;
}

.section {
  display: none;
  animation: fadeIn 0.4s ease;
}

.section.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.section-header {
  margin-bottom: 40px;
}

.section-num {
  display: inline-block;
  background: var(--primary);
  color: var(--white);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 16px;
}

.section-title {
  font-size: 32px;
  font-weight: 800;
  color: var(--gray-900);
  margin-bottom: 12px;
  line-height: 1.3;
}

.section-desc {
  font-size: 16px;
  color: var(--gray-500);
  max-width: 600px;
}

/* Cards */
.card {
  background: var(--white);
  border-radius: 20px;
  padding: 28px;
  box-shadow: var(--shadow);
  margin-bottom: 24px;
}

.card-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--gray-900);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.card-title .icon {
  font-size: 22px;
}

/* Grid Layouts */
.grid-2 {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
}

.grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.grid-4 {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}

/* Competitor Cards */
.competitor-card {
  background: var(--white);
  border-radius: 16px;
  padding: 24px;
  box-shadow: var(--shadow);
  border: 2px solid transparent;
  transition: all 0.2s;
}

.competitor-card.highlight {
  border-color: var(--primary);
  background: var(--primary-light);
}

.competitor-rank {
  font-size: 28px;
  margin-bottom: 12px;
}

.competitor-name {
  font-size: 20px;
  font-weight: 800;
  margin-bottom: 8px;
}

.competitor-stat {
  font-size: 13px;
  color: var(--gray-500);
  margin-bottom: 4px;
}

.competitor-stat strong {
  color: var(--gray-900);
}

/* Stats */
.stat-box {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: var(--white);
  border-radius: 16px;
  padding: 24px;
  text-align: center;
}

.stat-value {
  font-size: 36px;
  font-weight: 800;
  margin-bottom: 4px;
}

.stat-label {
  font-size: 13px;
  opacity: 0.85;
  font-weight: 600;
}

/* Comparison Table */
.compare-table {
  width: 100%;
  border-collapse: collapse;
}

.compare-table th, .compare-table td {
  padding: 16px 20px;
  text-align: left;
  border-bottom: 1px solid var(--gray-300);
}

.compare-table th {
  background: var(--gray-100);
  font-weight: 700;
  font-size: 14px;
  color: var(--gray-700);
}

.compare-table td {
  font-size: 14px;
}

.compare-table .highlight-col {
  background: var(--primary-light);
}

.compare-table .highlight-col strong {
  color: var(--primary);
}

/* Flow Diagram */
.flow-container {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 24px 0;
}

.flow-step {
  background: var(--white);
  border: 2px solid var(--gray-300);
  border-radius: 12px;
  padding: 16px 20px;
  text-align: center;
  min-width: 140px;
  transition: all 0.2s;
}

.flow-step.primary {
  border-color: var(--primary);
  background: var(--primary-light);
}

.flow-step.accent {
  border-color: var(--accent);
  background: var(--accent-light);
}

.flow-step-icon {
  font-size: 28px;
  margin-bottom: 8px;
}

.flow-step-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--gray-900);
}

.flow-step-desc {
  font-size: 12px;
  color: var(--gray-500);
  margin-top: 4px;
}

.flow-arrow {
  font-size: 24px;
  color: var(--gray-400);
  font-weight: 300;
}

/* Feature List */
.feature-group {
  margin-bottom: 32px;
}

.feature-group-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--primary-light);
}

.feature-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--gray-100);
}

.feature-check {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--primary);
  color: var(--white);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
  margin-top: 2px;
}

.feature-check.optional {
  background: var(--gray-300);
  color: var(--gray-700);
}

.feature-text {
  flex: 1;
}

.feature-name {
  font-weight: 600;
  font-size: 14px;
  color: var(--gray-900);
}

.feature-desc {
  font-size: 13px;
  color: var(--gray-500);
  margin-top: 2px;
}

/* Timeline */
.timeline {
  position: relative;
  padding-left: 32px;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 11px;
  top: 8px;
  bottom: 8px;
  width: 2px;
  background: var(--gray-300);
}

.timeline-item {
  position: relative;
  padding-bottom: 32px;
}

.timeline-item:last-child {
  padding-bottom: 0;
}

.timeline-dot {
  position: absolute;
  left: -32px;
  top: 4px;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--primary);
  border: 4px solid var(--white);
  box-shadow: 0 0 0 2px var(--primary);
}

.timeline-item.future .timeline-dot {
  background: var(--gray-300);
  box-shadow: 0 0 0 2px var(--gray-300);
}

.timeline-phase {
  font-size: 12px;
  font-weight: 700;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}

.timeline-item.future .timeline-phase {
  color: var(--gray-500);
}

.timeline-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--gray-900);
  margin-bottom: 8px;
}

.timeline-content {
  font-size: 14px;
  color: var(--gray-600);
}

/* Discussion Points */
.discussion-card {
  background: var(--white);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  border-left: 4px solid var(--accent);
}

.discussion-question {
  font-size: 18px;
  font-weight: 700;
  color: var(--gray-900);
  margin-bottom: 16px;
}

.discussion-options {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.discussion-option {
  background: var(--gray-100);
  border: 2px solid var(--gray-300);
  border-radius: 10px;
  padding: 14px 20px;
  font-size: 14px;
  font-weight: 600;
  color: var(--gray-700);
  cursor: pointer;
  transition: all 0.2s;
}

.discussion-option:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}

.discussion-note {
  background: var(--gray-100);
  border-radius: 10px;
  padding: 16px;
  font-size: 13px;
  color: var(--gray-600);
  margin-top: 16px;
}

/* NEW: System Architecture - Fixed Layout */
.system-arch {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 32px;
  align-items: start;
  padding: 32px;
}

.system-block {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.system-box {
  background: var(--white);
  border: 2px solid var(--gray-300);
  border-radius: 16px;
  padding: 24px;
  text-align: center;
}

.system-box.consumer {
  border-color: var(--primary);
  background: var(--primary-light);
}

.system-box.business {
  border-color: var(--purple);
  background: var(--purple-light);
}

.system-box.backend {
  border-color: var(--gray-500);
  background: var(--gray-100);
}

.system-box-icon {
  font-size: 36px;
  margin-bottom: 8px;
}

.system-box-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 4px;
}

.system-box-desc {
  font-size: 13px;
  color: var(--gray-500);
}

.system-features {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.system-feature {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 14px;
  font-weight: 500;
  text-align: center;
}

.system-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding-top: 40px;
}

.system-arrow {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--gray-400);
  font-size: 14px;
}

.system-arrow-line {
  width: 40px;
  height: 2px;
  background: var(--gray-300);
}

/* Tag */
.tag {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}

.tag-primary {
  background: var(--primary-light);
  color: var(--primary);
}

.tag-accent {
  background: var(--accent-light);
  color: var(--accent);
}

.tag-gray {
  background: var(--gray-100);
  color: var(--gray-600);
}

/* Alert Box */
.alert {
  background: #FEF3C7;
  border: 1px solid #F59E0B;
  border-radius: 12px;
  padding: 16px 20px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 24px;
}

.alert-icon {
  font-size: 20px;
}

.alert-content {
  flex: 1;
}

.alert-title {
  font-size: 14px;
  font-weight: 700;
  color: #92400E;
  margin-bottom: 4px;
}

.alert-text {
  font-size: 13px;
  color: #A16207;
}

/* BM Model */
.bm-row {
  display: flex;
  gap: 24px;
  margin-bottom: 24px;
}

.bm-box {
  flex: 1;
  background: var(--white);
  border-radius: 16px;
  padding: 24px;
  box-shadow: var(--shadow);
}

.bm-box-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--gray-500);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
}

.bm-box-content {
  font-size: 15px;
  color: var(--gray-900);
  line-height: 1.7;
}

.bm-price {
  font-size: 28px;
  font-weight: 800;
  color: var(--primary);
}

.bm-price-unit {
  font-size: 14px;
  color: var(--gray-500);
  font-weight: 500;
}

/* Cost Table */
.cost-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 16px;
}

.cost-table th, .cost-table td {
  padding: 14px 16px;
  text-align: left;
  border-bottom: 1px solid var(--gray-200);
  font-size: 14px;
}

.cost-table th {
  background: var(--gray-100);
  font-weight: 700;
  color: var(--gray-700);
}

.cost-table .cost-range {
  font-weight: 700;
  color: var(--primary);
}

/* KPI Card */
.kpi-card {
  background: linear-gradient(135deg, var(--white) 0%, var(--gray-100) 100%);
  border: 2px solid var(--gray-200);
  border-radius: 16px;
  padding: 24px;
  text-align: center;
}

.kpi-value {
  font-size: 32px;
  font-weight: 800;
  color: var(--primary);
  margin-bottom: 4px;
}

.kpi-label {
  font-size: 14px;
  font-weight: 600;
  color: var(--gray-700);
  margin-bottom: 8px;
}

.kpi-note {
  font-size: 12px;
  color: var(--gray-500);
}

/* Risk Item */
.risk-item {
  display: flex;
  gap: 16px;
  padding: 20px;
  background: var(--white);
  border-radius: 12px;
  margin-bottom: 16px;
  border-left: 4px solid #EF4444;
}

.risk-item.mitigated {
  border-left-color: var(--primary);
}

.risk-icon {
  font-size: 24px;
}

.risk-content {
  flex: 1;
}

.risk-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--gray-900);
  margin-bottom: 4px;
}

.risk-desc {
  font-size: 13px;
  color: var(--gray-600);
  margin-bottom: 8px;
}

.risk-mitigation {
  background: var(--primary-light);
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  color: var(--primary-dark);
}

/* Utility */
.mb-8 { margin-bottom: 8px; }
.mb-16 { margin-bottom: 16px; }
.mb-24 { margin-bottom: 24px; }
.mb-32 { margin-bottom: 32px; }
.mb-40 { margin-bottom: 40px; }

.text-center { text-align: center; }
.text-primary { color: var(--primary); }
.text-accent { color: var(--accent); }
.text-gray { color: var(--gray-500); }

.font-bold { font-weight: 700; }
.font-medium { font-weight: 500; }

/* Navigation buttons */
.nav-buttons {
  display: flex;
  justify-content: space-between;
  margin-top: 48px;
  padding-top: 32px;
  border-top: 1px solid var(--gray-300);
}

.nav-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 24px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  border: none;
}

.nav-btn-prev {
  background: var(--gray-100);
  color: var(--gray-700);
}

.nav-btn-prev:hover {
  background: var(--gray-200);
}

.nav-btn-next {
  background: var(--primary);
  color: var(--white);
}

.nav-btn-next:hover {
  background: var(--primary-dark);
}

.nav-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

/* Highlight */
.highlight-box {
  background: linear-gradient(135deg, var(--primary-light) 0%, #D1FAE5 100%);
  border-radius: 16px;
  padding: 24px;
  border: 2px solid var(--primary);
}

.pain-point {
  background: #FEE2E2;
  border-left: 4px solid #EF4444;
  padding: 16px 20px;
  border-radius: 0 12px 12px 0;
  margin-bottom: 12px;
}

.pain-point-text {
  font-size: 14px;
  color: #991B1B;
}

.solution-point {
  background: #D1FAE5;
  border-left: 4px solid var(--primary);
  padding: 16px 20px;
  border-radius: 0 12px 12px 0;
  margin-bottom: 12px;
}

.solution-point-text {
  font-size: 14px;
  color: var(--primary-dark);
}

/* 메모 패널 */
.memo-panel {
  width: 320px;
  background: var(--white);
  border-left: 1px solid var(--gray-300);
  position: fixed;
  right: 0;
  top: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  box-shadow: -4px 0 24px rgba(0,0,0,0.05);
  z-index: 100;
}

.memo-header {
  padding: 20px;
  border-bottom: 1px solid var(--gray-300);
  background: var(--gray-100);
}

.memo-header-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.memo-header-desc {
  font-size: 12px;
  color: var(--gray-500);
}

.memo-section-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--primary);
  padding: 12px 20px;
  background: var(--primary-light);
  border-bottom: 1px solid var(--gray-300);
}

.memo-content {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

.memo-textarea {
  width: 100%;
  height: 100%;
  min-height: 300px;
  border: 1px solid var(--gray-300);
  border-radius: 8px;
  padding: 12px;
  font-family: inherit;
  font-size: 14px;
  line-height: 1.6;
  resize: none;
  outline: none;
  transition: border-color 0.2s;
}

.memo-textarea:focus {
  border-color: var(--primary);
}

.memo-textarea::placeholder {
  color: var(--gray-500);
}

.memo-footer {
  padding: 16px;
  border-top: 1px solid var(--gray-300);
  background: var(--gray-100);
}

.memo-btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.memo-btn-primary {
  background: var(--primary);
  color: white;
  margin-bottom: 8px;
}

.memo-btn-primary:hover {
  background: var(--primary-dark);
}

.memo-btn-secondary {
  background: white;
  color: var(--gray-700);
  border: 1px solid var(--gray-300);
}

.memo-btn-secondary:hover {
  background: var(--gray-100);
}

.memo-saved {
  font-size: 11px;
  color: var(--gray-500);
  text-align: center;
  margin-top: 8px;
}

.memo-toast {
  position: fixed;
  bottom: 24px;
  right: 340px;
  background: var(--gray-900);
  color: white;
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 14px;
  animation: fadeInOut 2s ease-in-out;
  z-index: 200;
}

@keyframes fadeInOut {
  0% { opacity: 0; transform: translateY(10px); }
  15% { opacity: 1; transform: translateY(0); }
  85% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-10px); }
}

/* 메인 영역 조정 */
.main {
  margin-left: 280px;
  margin-right: 320px;
  padding: 48px;
  flex: 1;
}

.memo-toggle {
  position: fixed;

    if (saved) {
      setMemo(saved);
    }
  }, []);

  // 메모 저장 (디바운스)
  const saveMemo = (value) => {
    setMemo(value);
    
    if (saveTimeoutRef.current) {
      clearTimeout(saveTimeoutRef.current);
    }
    
    saveTimeoutRef.current = setTimeout(() => {
      localStorage.setItem('onmam_meeting_memo', value);
    }, 500);
  };

  // 메모 복사
  const copyMemo = () => {
    if (!memo.trim()) {
      setToast('작성된 메모가 없습니다');
      setTimeout(() => setToast(null), 2000);
      return;
    }

    const header = `📝 온맘마켓 컨셉 회의 메모\n작성일: ${new Date().toLocaleDateString('ko-KR')}\n\n${'='.repeat(40)}\n\n`;
    
    navigator.clipboard.writeText(header + memo).then(() => {
      setToast('✅ 메모가 복사되었습니다!');
      setTimeout(() => setToast(null), 2000);
    });
  };

  // 메모 초기화
  const clearMemo = () => {
    if (window.confirm('메모를 삭제하시겠습니까?')) {
      setMemo('');
      localStorage.removeItem('onmam_meeting_memo');
      setToast('메모가 초기화되었습니다');
      setTimeout(() => setToast(null), 2000);
    }
  };

  const currentIndex = SECTIONS.findIndex(s => s.id === activeSection);

  const goTo = (direction) => {
    const newIndex = direction === 'next' ? currentIndex + 1 : currentIndex - 1;
    if (newIndex >= 0 && newIndex < SECTIONS.length) {
      setActiveSection(SECTIONS[newIndex].id);
    }
  };

  const renderSection = () => {
    switch (activeSection) {
      case 'market': return <Section1_Market />;
      case 'positioning': return <Section2_Positioning />;
      case 'platform': return <Section3_Platform />;
      case 'flow': return <Section4_Flow />;
      case 'mvp': return <Section5_MVP />;
      case 'cost': return <Section6_Cost />;
      case 'kpi': return <Section7_KPI />;
      case 'risk': return <Section8_Risk />;
      case 'gtm': return <Section9_GTM />;
      case 'discussion': return <Section10_Discussion />;
      case 'openquestions': return <Section11_OpenQuestions />;
      default: return <Section1_Market />;
    }
  };

  return (
    <div className="app">
      <nav className="sidebar">
        <div className="sidebar-header">
          <div className="logo">🥬 온맘마켓</div>
          <div className="subtitle">플랫폼 컨셉 기획안</div>
        </div>
        <div className="nav-section">
          {SECTIONS.map((section) => (
            <div
              key={section.id}
              className={`nav-item ${activeSection === section.id ? 'active' : ''}`}
              onClick={() => setActiveSection(section.id)}
            >
              <div className="num">{section.num}</div>
              <span>{section.title}</span>
            </div>
          ))}
        </div>
      </nav>

      <main className="main">
        {renderSection()}
        <div className="nav-buttons">
          <button 
            className="nav-btn nav-btn-prev" 
            onClick={() => goTo('prev')}
            disabled={currentIndex === 0}
          >
            ← 이전
          </button>
          <button 
            className="nav-btn nav-btn-next" 
            onClick={() => goTo('next')}
            disabled={currentIndex === SECTIONS.length - 1}
          >
            다음 →
          </button>
        </div>
      </main>

      {/* 메모 토글 버튼 (모바일/작은 화면용) */}
      <button 
        className={`memo-toggle ${memoPanelOpen ? 'open' : ''}`}
        onClick={() => setMemoPanelOpen(!memoPanelOpen)}
      >
        {memoPanelOpen ? '→' : '📝'}
      </button>

      {/* 메모 패널 */}
      <aside className={`memo-panel ${memoPanelOpen ? 'open' : ''}`}>
        <div className="memo-header">
          <div className="memo-header-title">📝 회의 메모</div>
          <div className="memo-header-desc">자동 저장 · 로컬 저장</div>
        </div>

        <div className="memo-content">
          <textarea
            className="memo-textarea"
            placeholder={`회의 중 메모를 자유롭게 작성하세요...\n\n예시:\n• 대표님 의견:\n• 결정 사항:\n• 추가 확인 필요:\n• Action Item:`}
            value={memo}
            onChange={(e) => saveMemo(e.target.value)}
          />
        </div>

        <div className="memo-footer">
          <button className="memo-btn memo-btn-primary" onClick={copyMemo}>
            📋 메모 복사하기
          </button>
          <button className="memo-btn memo-btn-secondary" onClick={clearMemo}>
            🗑️ 초기화
          </button>
          <div className="memo-saved">
            {memo.trim() ? `${memo.length}자 작성됨` : '메모 없음'}
          </div>
        </div>
      </aside>

      {/* 토스트 메시지 */}
      {toast && <div className="memo-toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
